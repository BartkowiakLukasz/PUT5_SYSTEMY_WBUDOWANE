<!DOCTYPE html>
<html>
<head>
    <title>Sterowanie pojazdem z kamerą</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { 
            text-align: center; 
            font-family: sans-serif; 
            -webkit-user-select: none; user-select: none;         
            -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column; align-items: center;
            background: #222; color: white;
        }
        
        img { 
            width: 100%; 
            max-width: 640px; 
            border: 2px solid #555; 
            transform: rotate(180deg);
        }

        button { 
            width: 80px; height: 80px; margin: 5px; 
            font-size: 24px; background: #444; color: white; border: none; borderRadius: 10px;
        }
        button:active { background: #666; }
        #camera_container {
            margin-bottom: 20px; border: 1px solid #ccc;
            width: 640px; height: 480px; background-color: #000;
        }
        #camera_stream { display: block; width: 100%; height: 100%; }
        #warning { color: red; font-weight: bold; margin-top: 20px; display: none; font-size: 1.2em;}
        @media (max-width: 680px) {
            #camera_container { width: 95%; max-width: 640px; height: auto; }
        }
    </style>
    <script>
        let interval;
        let lastAction = null;

        function sendCommand(action) {
            fetch("/move", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "action=" + action
            })
            .then(response => response.text())
            .then(text => {
                const warningDiv = document.getElementById("warning");
                if (text === "obstacle") {
                    warningDiv.style.display = "block";
                } else {
                     if (action !== "forward" || text !== "obstacle") { 
                        warningDiv.style.display = "none";
                    }
                }
            })
            .catch(error => console.error('Błąd:', error));
        }

        function startSending(action, event) {
            if (event) event.preventDefault();
            if (lastAction === action && action !== "stop") return; 
            
            lastAction = action;
            sendCommand(action);
            clearInterval(interval);
            
            if (action !== "stop") { 
                interval = setInterval(() => {
                    if (lastAction !== "stop") sendCommand(lastAction);
                    else clearInterval(interval);
                }, 200);
            }
        }

        function stopSending(event) {
            if (event) event.preventDefault();
            clearInterval(interval);
            sendCommand("stop");
            lastAction = "stop";
        }

        document.addEventListener('DOMContentLoaded', (event) => {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('touchcancel', stopSending, { passive: false });
            });
        });
    </script>
</head>
<body>
    <h1>Panel Sterowania</h1>
    
    <div id="camera_container">
        <img id="camera_stream" src="{{ url_for('video_feed') }}" alt="Ładowanie...">
    </div>

    <div id="controls">
        <button onmousedown="startSending('forward', event)" onmouseup="stopSending(event)" ontouchstart="startSending('forward', event)" ontouchend="stopSending(event)">▲</button><br>
        <button onmousedown="startSending('left', event)" onmouseup="stopSending(event)" ontouchstart="startSending('left', event)" ontouchend="stopSending(event)">◄</button>
        <button onmousedown="startSending('stop', event)" onmouseup="stopSending(event)" ontouchstart="startSending('stop', event)" ontouchend="stopSending(event)">■</button>
        <button onmousedown="startSending('right', event)" onmouseup="stopSending(event)" ontouchstart="startSending('right', event)" ontouchend="stopSending(event)">►</button><br>
        <button onmousedown="startSending('backward', event)" onmouseup="stopSending(event)" ontouchstart="startSending('backward', event)" ontouchend="stopSending(event)">▼</button>
    </div>
    <div id="warning">⚠️ PRZESZKODA! ⚠️</div>
</body>
</html>
